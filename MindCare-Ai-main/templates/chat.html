{% extends "base.html" %}
{% block title %}Chat – MindCare AI{% endblock %}

{% block main %}
<section class="chat-page animate-fade">
  <h1>Chat</h1>
  <p class="intro">Share what’s on your mind. You’ll get an empathetic, non-medical reply. This chat remembers our conversation.</p>

  <div class="chat-container">
    <div id="chatMessages" class="chat-messages" role="log" aria-live="polite"></div>
    <form id="chatForm" class="chat-form">
      <label for="chatInput" class="sr-only">Your message</label>
      <textarea id="chatInput" rows="2" placeholder="Type a message..." autocomplete="off"></textarea>
      <button type="submit" id="chatSend">Send</button>
    </form>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var form = document.getElementById('chatForm');
  var input = document.getElementById('chatInput');
  var send = document.getElementById('chatSend');
  var container = document.getElementById('chatMessages');

  function addBubble(text, isUser) {
    var div = document.createElement('div');
    div.className = 'chat-bubble ' + (isUser ? 'user' : 'assistant');
    div.innerHTML = (text || '').replace(/\n/g, '<br>');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  fetch('/chat/history').then(function(r){ return r.json(); }).then(function(d) {
    var ms = d.messages || [];
    if (ms.length === 0) addBubble('Hi. I\'m here to listen. What\'s on your mind?', false);
    else ms.forEach(function(m) { addBubble(m.content, m.role === 'user'); });
  }).catch(function() { addBubble('Hi. What would you like to talk about?', false); });

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var t = (input && input.value) ? input.value.trim() : '';
    if (!t) return;
    addBubble(t, true);
    input.value = '';
    send.disabled = true;
    fetch('/chat/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: t })
    }).then(function(r) { return r.json(); })
      .then(function(d) { addBubble(d.reply || 'I’m here. How can I support you today?', false); })
      .catch(function() { addBubble('Something went wrong. Please try again.', false); })
      .finally(function() { send.disabled = false; });
  });
})();
</script>
{% endblock %}
